name: Bug report
description: Report broken or incorrect ClawWork behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a ClawWork problem.

        Do **not** include secrets, API keys, private customer data, full access tokens, or sensitive logs. If sensitive details are needed, say "sensitive details available" and a maintainer will follow up privately.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include page names, API routes, tool names, and exact safe inputs where possible.
      placeholder: |
        1. Go to ...
        2. Click/call ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Error messages, status codes, screenshots, timestamps, request paths, or logs with secrets removed.
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who/what is blocked? Is there a workaround?
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Agent runtime
        - Tools
        - Web UI
        - API
        - Auth / GitHub / integrations
        - Billing / usage
        - Documentation
        - Unknown / other
    validations:
      required: true
